name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Vite base path — derived from the repository name so assets and
      # deep links resolve on <user>.github.io/<repo>/.
      PORTFOLIO_BASE: /${{ github.event.repository.name }}/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # enablement: true turns Pages on (source = GitHub Actions) if it
      # isn't already, so no manual repo-settings step is needed.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      # `npm ci` installs the lockfile exactly and is the right default. It
      # can still fail on a runner when the lockfile can't be reproduced
      # there (a platform-specific optional dep, or a pinned version the
      # registry won't serve). Falling back to `npm install` re-resolves
      # within the semver ranges in package.json; the typecheck/lint/test
      # gates below then catch any resolution that actually breaks the app,
      # so a fallback can't silently ship a broken build.
      - name: Install dependencies
        run: |
          if npm ci --no-audit --no-fund; then
            echo "installed via npm ci (lockfile reproduced exactly)"
          else
            echo "::warning::npm ci failed - falling back to npm install"
            npm install --no-audit --no-fund
            echo "installed via npm install (lockfile re-resolved)"
          fi

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    # Deploys only if every check in `build` passed.
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
